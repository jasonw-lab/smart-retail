name: Deploy VPS

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check for frontend changes
        id: check_frontend
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "^frontend/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for backend changes
        id: check_backend
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "^backend/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set build arguments
        id: changes
        run: |
          BUILD_ARGS=""
          if [[ "${{ steps.check_frontend.outputs.changed }}" == "true" ]]; then
            BUILD_ARGS="frontend"
          fi
          if [[ "${{ steps.check_backend.outputs.changed }}" == "true" ]]; then
            if [[ -n "$BUILD_ARGS" ]]; then
              BUILD_ARGS="$BUILD_ARGS backend"
            else
              BUILD_ARGS="backend"
            fi
          fi
          echo "build_args=$BUILD_ARGS" >> $GITHUB_OUTPUT

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "Working directory: ${{ secrets.PROJECT_PATH }}"
            cd ${{ secrets.PROJECT_PATH }}
            git pull

            # Execute front.sh if there are frontend changes
            if [[ "${{ steps.check_frontend.outputs.changed }}" == "true" ]]; then
              bash ./front.sh
            fi

            # Execute back.sh if there are backend changes
            if [[ "${{ steps.check_backend.outputs.changed }}" == "true" ]]; then
              bash ./back.sh
            fi
