name: Deploy VPS

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/frontend/**'
      - 'apps/backend/**'
      - 'apps/simulator/**'
      - 'platform/docker/**'
      - 'front.sh'
      - 'back.sh'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check for frontend changes
        id: check_frontend
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -Eq "^(apps/frontend/|front\.sh$)"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for app changes
        id: check_apps
        run: |
          CHANGED_FILES="$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} || true)"

          BACKEND_CHANGED=false
          SIMULATOR_CHANGED=false

          if grep -Eq "^(apps/backend/|platform/docker/Dockerfile\.backend$)" <<< "$CHANGED_FILES"; then
            BACKEND_CHANGED=true
          fi

          if grep -Eq "^(apps/simulator/|platform/docker/Dockerfile\.simulator$)" <<< "$CHANGED_FILES"; then
            SIMULATOR_CHANGED=true
          fi

          if grep -Eq "^(platform/docker/docker-compose-app\.yml|platform/docker/start-retail-app\.sh|back\.sh$)" <<< "$CHANGED_FILES"; then
            BACKEND_CHANGED=true
            SIMULATOR_CHANGED=true
          fi

          if [[ "$BACKEND_CHANGED" == "true" || "$SIMULATOR_CHANGED" == "true" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

          echo "backend_changed=$BACKEND_CHANGED" >> $GITHUB_OUTPUT
          echo "simulator_changed=$SIMULATOR_CHANGED" >> $GITHUB_OUTPUT

      - name: Set backend deploy target
        id: backend_target
        run: |
          TARGET=""

          if [[ "${{ steps.check_apps.outputs.backend_changed }}" == "true" && "${{ steps.check_apps.outputs.simulator_changed }}" == "true" ]]; then
            TARGET="all"
          elif [[ "${{ steps.check_apps.outputs.backend_changed }}" == "true" ]]; then
            TARGET="backend"
          elif [[ "${{ steps.check_apps.outputs.simulator_changed }}" == "true" ]]; then
            TARGET="simulator"
          fi

          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Set build arguments
        id: changes
        run: |
          BUILD_ARGS=""
          if [[ "${{ steps.check_frontend.outputs.changed }}" == "true" ]]; then
            BUILD_ARGS="frontend"
          fi
          if [[ "${{ steps.check_apps.outputs.changed }}" == "true" ]]; then
            if [[ -n "$BUILD_ARGS" ]]; then
              BUILD_ARGS="$BUILD_ARGS backend"
            else
              BUILD_ARGS="backend"
            fi
          fi
          echo "build_args=$BUILD_ARGS" >> $GITHUB_OUTPUT

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -e
            echo "Working directory: ${{ secrets.PROJECT_PATH }}"
            cd ${{ secrets.PROJECT_PATH }}
            git pull

            # Execute front.sh if there are frontend changes
            if [[ "${{ steps.check_frontend.outputs.changed }}" == "true" ]]; then
              bash ./front.sh
            fi

            # Execute back.sh if there are backend changes
            if [[ "${{ steps.check_apps.outputs.changed }}" == "true" ]]; then
              bash ./back.sh "${{ steps.backend_target.outputs.target }}"
            fi
