  # MySQL for smart-retail
  smart-retail-mysql:
    image: mysql:8.0.29
    container_name: smart-retail-mysql-8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_ROOT_HOST: "%"
      TZ: Asia/Tokyo
      LANG: en_US.UTF-8
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_general_ci"]
    volumes:
      - ./sql/mysql-init:/docker-entrypoint-initdb.d
      - ${BASEPATH}/mysql_3306/conf/my.cnf:/etc/my.cnf
      - ${BASEPATH}/mysql_3306/data:/var/lib/mysql
      - ${BASEPATH}/mysql_3306/log:/var/log/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      jason-lab-net:
        aliases:
          - powerjob-mysql

  # PowerJob Server
  smart-retail-powerjob-server:
    image: powerjob/powerjob-server:latest
    container_name: smart-retail-powerjob-server
    restart: unless-stopped
    environment:
      TZ: Asia/Tokyo
      JVMOPTIONS: "-Xmx512m"
      PARAMS: "--spring.datasource.core.jdbc-url=jdbc:mysql://powerjob-mysql:3306/powerjob?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Tokyo --spring.datasource.core.username=root --spring.datasource.core.password=123456 --oms.storage.dfs.mysql_series.url=jdbc:mysql://powerjob-mysql:3306/powerjob?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Tokyo --oms.storage.dfs.mysql_series.username=root --oms.storage.dfs.mysql_series.password=123456"
    ports:
      - "7700:7700"
      - "10086:10086"
    networks:
      - jason-lab-net
    depends_on:
      smart-retail-mysql:
        condition: service_healthy

