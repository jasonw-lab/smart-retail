name: Deploy VPS

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/frontend/**'
      - 'apps/frontend-ec/**'
      - 'apps/backend/**'
      - 'apps/simulator/**'
      - 'platform/docker/**'
      - 'front.sh'
      - 'back.sh'
      - '.github/workflows/deploy.yml'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend:      ${{ steps.filter.outputs.backend }}
      frontend:     ${{ steps.filter.outputs.frontend }}
      frontend-ec:  ${{ steps.filter.outputs.frontend-ec }}
      front_sh:     ${{ steps.filter.outputs.front_sh }}
      back_sh:      ${{ steps.filter.outputs.back_sh }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'platform/docker/**'
            frontend:
              - 'apps/frontend/**'
            frontend-ec:
              - 'apps/frontend-ec/**'
            front_sh:
              - 'front.sh'
            back_sh:
              - 'back.sh'

  deploy-api:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend  == 'true' ||
      needs.detect-changes.outputs.back_sh  == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DEPLOY_HOST: ${{ secrets.VPS_HOST }}
      DEPLOY_USER: ${{ secrets.VPS_USERNAME }}
      DEPLOY_PATH: ${{ secrets.PROJECT_PATH }}
    steps:
      - name: Validate deployment configuration
        run: |
          missing=()
          [ -n "${DEPLOY_HOST}" ] || missing+=("VPS_HOST")
          [ -n "${DEPLOY_USER}" ] || missing+=("VPS_USERNAME")
          [ -n "${DEPLOY_PATH}" ] || missing+=("PROJECT_PATH")
          [ -n "${{ secrets.VPS_SSH_KEY }}" ] || missing+=("VPS_SSH_KEY")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing deployment configuration: ${missing[*]}"
            echo "::error::Set these as GitHub repository secrets before running deploy."
            exit 1
          fi

      - name: Deploy API
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 30m
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}
            git pull
            bash ./back.sh

  deploy-frontend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend    == 'true' ||
      needs.detect-changes.outputs['frontend-ec'] == 'true' ||
      needs.detect-changes.outputs.front_sh    == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DEPLOY_HOST: ${{ secrets.VPS_HOST }}
      DEPLOY_USER: ${{ secrets.VPS_USERNAME }}
      DEPLOY_PATH: ${{ secrets.PROJECT_PATH }}
    steps:
      - name: Validate deployment configuration
        run: |
          missing=()
          [ -n "${DEPLOY_HOST}" ] || missing+=("VPS_HOST")
          [ -n "${DEPLOY_USER}" ] || missing+=("VPS_USERNAME")
          [ -n "${DEPLOY_PATH}" ] || missing+=("PROJECT_PATH")
          [ -n "${{ secrets.VPS_SSH_KEY }}" ] || missing+=("VPS_SSH_KEY")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing deployment configuration: ${missing[*]}"
            echo "::error::Set these as GitHub repository secrets before running deploy."
            exit 1
          fi

      - name: Deploy Frontend
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 30m
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}
            git pull
            bash ./front.sh

