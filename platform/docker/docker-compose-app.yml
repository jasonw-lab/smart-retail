networks:
  jason-lab-net:
    external: true
    name: jason-lab-net

services:
  # Backend Service (Spring Boot)
  smart-retail-backend:
    profiles: ["backend", "all"]
    build:
      context: ../..
      dockerfile: platform/docker/Dockerfile.backend
    container_name: smart-retail-backend
    restart: unless-stopped
    ports:
      - "18989:8989"
    environment:
      - TZ=Asia/Tokyo
      - SPRING_PROFILES_ACTIVE=prod
      - MYSQL_HOST=smart-retail-mysql-8
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=youlai_boot
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${DATASOURCE_PASSWORD:-123456}
      - SPRING_DATA_REDIS_HOST=ec-demo-redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-123456}
      - MINIO_ENDPOINT=http://ec-demo-minio:9000
    volumes:
      - ${BASEPATH}/app/backend/logs:/var/logs
      - /etc/localtime:/etc/localtime
    networks:
      - jason-lab-net

  # Simulator Service (PowerJob Worker)
  smart-retail-simulator:
    profiles: ["simulator", "all"]
    build:
      context: ../..
      dockerfile: platform/docker/Dockerfile.simulator
    container_name: smart-retail-simulator
    restart: unless-stopped
    ports:
      - "18181:8081"
    environment:
      - TZ=Asia/Tokyo
      - SPRING_PROFILES_ACTIVE=prod
      - POWERJOB_SERVER_ADDRESS=${POWERJOB_SERVER_ADDRESS:-smart-retail-powerjob-server:7700}
    volumes:
      - ${BASEPATH}/app/simulator/logs:/var/logs
      - /etc/localtime:/etc/localtime
    networks:
      - jason-lab-net

